nosound : no
autostart : yes
speed : yes
test : yes
openbrowseriferror: no
modena : yes  
customcss : no  

akka {
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  loglevel = "ERROR"

  debug {
    receive = off
    autoreceive = off
    lifecycle = off
    fsm = off
    event-stream = off
    unhandled = off
  }
}



